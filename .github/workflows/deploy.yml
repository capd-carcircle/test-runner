name: Deploy Test Runner

on:
  push:
    branches: [main]

env:
  PROJECT_ID: capd-carcircle-dev
  REGION: asia-northeast3
  IMAGE: asia-northeast3-docker.pkg.dev/capd-carcircle-dev/capd/test-runner
  JOB_NAME: capd-test-runner

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & Push image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} -t ${{ env.IMAGE }}:latest .
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy Cloud Run Job (create or update)
        run: |
          if gcloud run jobs describe ${{ env.JOB_NAME }} \
              --region ${{ env.REGION }} \
              --project ${{ env.PROJECT_ID }} > /dev/null 2>&1; then
            gcloud run jobs update ${{ env.JOB_NAME }} \
              --image ${{ env.IMAGE }}:${{ github.sha }} \
              --region ${{ env.REGION }} \
              --project ${{ env.PROJECT_ID }} \
              --set-env-vars "DATABASE_URL=${{ secrets.DATABASE_URL }},BACKEND_URL=${{ secrets.BACKEND_URL }},TEST_PASSWORD=${{ secrets.TEST_PASSWORD }},GCP_PROJECT_ID=${{ env.PROJECT_ID }},GCP_REGION=${{ env.REGION }},GEMINI_MODEL=gemini-2.5-flash,MAX_WORKERS=5,GEMINI_CONCURRENCY=3,GEMINI_MAX_RETRIES=4"
          else
            gcloud run jobs create ${{ env.JOB_NAME }} \
              --image ${{ env.IMAGE }}:${{ github.sha }} \
              --region ${{ env.REGION }} \
              --project ${{ env.PROJECT_ID }} \
              --set-env-vars "DATABASE_URL=${{ secrets.DATABASE_URL }},BACKEND_URL=${{ secrets.BACKEND_URL }},TEST_PASSWORD=${{ secrets.TEST_PASSWORD }},GCP_PROJECT_ID=${{ env.PROJECT_ID }},GCP_REGION=${{ env.REGION }},GEMINI_MODEL=gemini-2.5-flash,MAX_WORKERS=5,GEMINI_CONCURRENCY=3,GEMINI_MAX_RETRIES=4" \
              --max-retries 1 \
              --task-timeout 900
          fi
